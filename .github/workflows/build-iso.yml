name: Build Offline ISO
on:
  workflow_dispatch: # הפעלה ידנית בלחיצת כפתור

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # שלב קריטי ל-ISO אופליין: פינוי מקום בשרת של גיטהאב
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build Offline Installer ISO
        uses: jasonn3/build-container-installer@main
        id: build
        with:
          arch: x86_64
          image_name: roseite
          image_repo: ghcr.io/ashivered
          image_tag: 43
          version: 43
          variant: Kinoite
          iso_name: roseite-offline.iso
          iso_type: offline # הפקודה שיוצרת את ההתקנה הסגורה

      - name: Max Compression with XZ
        run: |
          # דחיסה של הקובץ הסופי בלבד לרמה הכי גבוהה
          xz -9v ${{ steps.build.outputs.iso_path }}/roseite-offline.iso

      - name: Upload Compressed ISO
        uses: actions/upload-artifact@v4
        with:
          name: roseite-final-xz
          # אנחנו מעלים רק את הקובץ הדחוס
          path: ${{ steps.build.outputs.iso_path }}/roseite-offline.iso.xz
          if-no-files-found: error
          retention-days:
