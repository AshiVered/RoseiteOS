name: torah-os
description: "מערכת לימוד מוגנת - זית ואונלי אופיס"
base: ghcr.io/vanilla-os/desktop:latest

stages:
  - name: customize
    modules:
      - type: shell
        commands:
          # 1. התקנת תשתיות זמניות
          - apt update
          - apt install -y curl ca-certificates sed libfuse2
          
          # 2. התקנת OnlyOffice
          - apt install -y onlyoffice-desktopeditors
          
          # 3. התקנת אפליקציית "זית" (טיפול ב-sudo ובשאלות אינטראקטיביות)
          - curl -L https://zayitapp.com/download/launch.linux -o /tmp/zayit_install.sh
          - sed -i 's/sudo //g' /tmp/zayit_install.sh
          - chmod +x /tmp/zayit_install.sh
          # הרצה ללא שאלות (yes) ותחת הגדרת ה-Frontend הלא-אינטראקטיבי
          - DEBIAN_FRONTEND=noninteractive yes "" | bash /tmp/zayit_install.sh
          
          # 4. נעילה הרמטית - הסרת טרמינל, רשת, דפדפן וכלים של ונילה
          - apt purge -y gnome-terminal xterm network-manager net-tools iproute2 wpasupplicant wireless-tools firefox-esr gnome-software wget curl sed apx abroot
          
          # 5. ניקוי שאריות
          - apt autoremove -y
          - rm /tmp/zayit_install.sh

      - type: shell
        commands:
          # 6. ביטול הרשאות מנהל למשתמש ברירת המחדל
          - delgroup vanilla sudo || true
          # 7. נעילה מוחלטת של Root
          - passwd -l root
